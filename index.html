<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GBA V5 - HARDWARE LAB</title>
    <style>
      /* --- RESET GLOBAL --- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #050505;
        overflow-x: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #00ffa3;
      }
      /* Ocultar barra de scroll */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      /* --- ESTILOS DE LABORATORIO (Integrados de style.css) --- */
      
      /* Línea de escaneo animada */
      .scanline {
        width: 100%;
        height: 2px;
        background: rgba(0, 255, 163, 0.1);
        position: absolute;
        top: 0;
        left: 0;
        z-index: 10;
        animation: scan 4s linear infinite;
        pointer-events: none;
      }

      @keyframes scan {
        0% { top: 0%; }
        100% { top: 100%; }
      }

      /* Contenedor del emulador con brillo neón */
      .emu-screen-container {
        border: 1px solid #00ffa3;
        box-shadow: 0 0 15px rgba(0, 255, 163, 0.2), inset 0 0 10px rgba(0, 0, 0, 0.5);
        position: relative;
        background: #000;
        border-radius: 4px;
        overflow: hidden;
      }

      /* Estilo para asegurar que el iframe ocupe el contenedor */
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
</head>
<body>
    <div id="root"></div>   
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
